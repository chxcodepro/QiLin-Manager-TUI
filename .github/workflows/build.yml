name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: 整理依赖
        run: go mod tidy

      - name: 运行测试
        run: go test ./...

      - name: 构建二进制
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/qilin-manager-tui ./cmd/qilin-manager-tui

      - name: 打包
        run: |
          mkdir -p release
          tar -czf release/qilin-manager-tui_linux_${{ matrix.goarch }}.tar.gz -C dist qilin-manager-tui

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: qilin-manager-tui_linux_${{ matrix.goarch }}
          path: release/qilin-manager-tui_linux_${{ matrix.goarch }}.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.tar.gz
